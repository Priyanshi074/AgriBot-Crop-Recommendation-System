<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AgriBot</title>

    <style>
        body {
            font-family: Arial;
            background: #e6f4ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #14532d;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        a {
            color: green;
            text-decoration: none;
        }

        .error {
            color: red;
            text-align: center;
        }

        .back {
            text: center;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login to AgriBot</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter email" required>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/signup/">Register</a>
    </div>

    <a href="/" class="back">← Back to Home</a>
</div>

</body>
</html>
