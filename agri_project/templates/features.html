<!DOCTYPE html>
<html>
<head>
    <title>AgriBot Features</title>
    <style>
        body {
            font-family: Arial;
            background: #e6f4ea;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #14532d;
        }

        .card {
            display: inline-block;
            width: 250px;
            padding: 20px;
            margin: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>🌿 Welcome to AgriBot</h1>
<p>Select a feature to continue</p>

<div class="card">
    <h3>🌱 Crop Recommendation</h3>
    <a href="/crop/"><button>Open</button></a>
</div>

<div class="card">
    <h3>🍃 Disease Detection</h3>
    <a href="/disease/"><button>Open</button></a>
</div>

<div class="card">
    <h3>🤖 Chatbot</h3>
    <a href="/chat/"><button>Open</button></a>
</div>

<br><br>

<a href="/dashboard/"><button>📊 View My History</button></a>
<a href="/logout/"><button>🚪 Logout</button></a>

</body>
</html>
