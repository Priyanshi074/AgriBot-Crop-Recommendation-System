<!DOCTYPE html>
<html>
<head>

<title>Smart Agriculture</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: #ddf5e4;
min-height:100vh;
font-family:'Segoe UI';
}

.main-card{
margin:80px auto;
padding:40px;
border-radius:20px;
background:white;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
max-width:500px;
animation: fadeIn 0.6s ease;
}

.preview{
display:none;
width:300px;
height:220px;
object-fit:cover;
border-radius:15px;
margin:20px auto;
}

video{
display:none;
width:300px;
height:220px;
object-fit:cover;
border-radius:15px;
margin:20px auto;
}

/* animation */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

button{
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}
</style>

</head>

<body>

<div class="container">
<div class="main-card">

<h2>🌿 Crop Disease Detection</h2>
<p class="text-muted">Upload OR capture image</p>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- STEP 1: ONLY BUTTONS -->
<div class="mb-3">
<button type="button" class="btn btn-outline-success" onclick="showUpload()">Upload</button>
<button type="button" class="btn btn-outline-primary" onclick="showCamera()">Camera</button>
</div>

<!-- STEP 2: Upload appears ONLY after click -->
<div id="upload-section" style="display:none;">
<input type="file" name="image" class="form-control" onchange="previewImage(event)">
</div>

<!-- STEP 2: Camera appears ONLY after click -->
<div id="camera-section" style="display:none;">
<video id="camera" autoplay></video><br>
<button type="button" id="captureBtn" class="btn btn-primary mt-2" onclick="captureImage()">Capture</button>
</div>

<!-- STEP 3: Preview -->
<img id="preview" class="preview">

<input type="hidden" name="captured_image" id="captured_image">

{% if error %}
<p class="text-danger mt-2">{{ error }}</p>
{% endif %}

<button class="btn btn-success w-100 mt-4">Detect Disease</button>

</form>

</div>
</div>

<script>

let stream;

// Upload click
function showUpload(){
document.getElementById('upload-section').style.display = "block";
document.getElementById('camera-section').style.display = "none";
stopCamera();
}

// Camera click
function showCamera(){
document.getElementById('upload-section').style.display = "none";
document.getElementById('camera-section').style.display = "block";
startCamera();
}

// preview upload
function previewImage(event){
const preview = document.getElementById('preview');
preview.src = URL.createObjectURL(event.target.files[0]);
preview.style.display = "block";

document.getElementById('captured_image').value = "";
}

// start camera
function startCamera(){
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => {
stream = s;
document.getElementById('camera').srcObject = stream;
document.getElementById('camera').style.display = "block";
});
}

// stop camera
function stopCamera(){
if(stream){
stream.getTracks().forEach(track => track.stop());
}
document.getElementById('camera').style.display = "none";
}

// capture
function captureImage(){
const video = document.getElementById('camera');
const canvas = document.createElement('canvas');

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext('2d');
ctx.drawImage(video,0,0);

const data = canvas.toDataURL('image/png');

document.getElementById('captured_image').value = data;

const preview = document.getElementById('preview');
preview.src = data;
preview.style.display = "block";

// hide capture button after capture
document.getElementById('captureBtn').style.display = "none";

stopCamera();
}

</script>

</body>
</html>
