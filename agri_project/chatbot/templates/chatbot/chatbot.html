<!DOCTYPE html>

<html>
<head>
    <title>Agrisaarthi</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ddf5e4;
        margin: 0;
    }

    h2 {
        text-align: center;
        padding: 20px;
        color: #14532d;
    }

    /* Chat Container */
    .chat-container {
        width: 75%;
        margin: auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        padding: 15px;
    }

    /* Chat Box */
    #chat-box {
        height: 400px;
        overflow-y: auto;
        background: #f9fafb;
        padding: 10px;
        border-radius: 10px;
    }

    /* Messages */
    .user, .bot {
        padding: 10px 15px;
        margin: 10px 0;
        border-radius: 15px;
        max-width: 70%;
        display: inline-block;
        clear: both;
    }

    .user {
        background: #16a34a;
        color: white;
        float: right;
        text-align: right;
    }

    .bot {
        background: #e5e7eb;
        color: #333;
        float: left;
    }

    /* Input Section */
    .input-area {
        margin-top: 10px;
        display: flex;
    }

    #user-input {
        width: 80%;
        padding: 12px;
        border-radius: 10px 0 0 10px;
        border: 1px solid #ccc;
        outline: none;
    }

    button {
        width: 20%;
        background: #16a34a;
        color: white;
        border: none;
        border-radius: 0 10px 10px 0;
        cursor: pointer;
    }

    button:hover {
        background: #15803d;
    }
</style>

</head>

<body>

<h2>🤖 Agrisaarthi Assistant</h2>

<div class="chat-container">
    <div id="chat-box"></div>

<div class="input-area">
    {% csrf_token %}
    <input type="text" id="user-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            let cookies = document.cookie.split(";");
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function sendMessage() {
        let msg = document.getElementById("user-input").value;

        fetch("/chatbot/get-response/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": getCookie("csrftoken")   // ✅ FIXED
            },
            body: "message=" + encodeURIComponent(msg)
        })
        .then(res => res.json())
        .then(data => {
            let chatBox = document.getElementById("chat-box");

            chatBox.innerHTML += "<p class='user'>" + msg + "</p>";
            chatBox.innerHTML += "<p class='bot'>" + data.response + "</p>";

            document.getElementById("user-input").value = "";
        });
    }
    {% comment %} function getCSRFToken() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    function sendMessage() {
        let msg = document.getElementById("user-input").value;

        fetch("/chatbot/get-response/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": getCSRFToken()   // ✅ correct
            },
            body: "message=" + encodeURIComponent(msg)
        })
        .then(res => res.json())
        .then(data => {
            let chatBox = document.getElementById("chat-box");

            chatBox.innerHTML += "<p class='user'>" + msg + "</p>";
            chatBox.innerHTML += "<p class='bot'>" + data.response + "</p>";

            document.getElementById("user-input").value = "";
        });
    } {% endcomment %}

{% comment %} function sendMessage() {
    let input = document.getElementById("user-input");
    let msg = input.value.trim();

    if (!msg) return;

    let chatBox = document.getElementById("chat-box");

    // Show user message
    chatBox.innerHTML += `<p class='user'>${msg}</p>`;

    // Clear input
    input.value = "";

    // ✅ SINGLE CORRECT FETCH
    fetch("/chatbot/get-response/", {
        method: "POST",
        headers: {

        chatBox.scrollTop = chatBox.scrollHeight;

    .catch(error => {

    });
}
document.getElementById("user-input").addEventListener("keypress", function(e) {
